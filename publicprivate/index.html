<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Private Company | Apps</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 2rem;
            border-bottom: 1px solid #1e293b;
            background: #1e293b;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0;
            color: #38bdf8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .container {
            flex: 1;
            max-width: 800px;
            margin: 4rem auto;
            padding: 0 2rem;
            display: flex;
            justify-content: flex-start;
        }

        .app-bubble {
            background: #1e293b;
            border-radius: 20px;
            padding: 2rem;
            width: 220px;
            height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 2px solid #334155;
        }

        .app-bubble:hover {
            transform: translateY(-5px);
            background: #334155;
            border-color: #38bdf8;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        .app-icon {
            font-size: 5rem;
            margin-bottom: 0.5rem;
        }

        .app-name {
            font-weight: 700;
            font-size: 1.2rem;
            color: #f8fafc;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 99;
            backdrop-filter: blur(4px);
        }

        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e293b;
            padding: 2.5rem;
            border-radius: 24px;
            border: 1px solid #38bdf8;
            z-index: 100;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .modal h3 {
            margin-top: 0;
            color: #38bdf8;
            font-size: 1.5rem;
        }

        .modal p {
            line-height: 1.6;
            color: #cbd5e1;
        }

        .close-btn {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 0;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            font-weight: 800;
            margin-top: 1.5rem;
            font-size: 1rem;
        }

        footer {
            padding: 2rem;
            text-align: center;
            border-top: 1px solid #1e293b;
            font-size: 0.9rem;
            color: #64748b;
        }

        footer a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 500;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <header>
        <h1>Public Private Company</h1>
    </header>

    <div class="container">
        <div class="app-bubble" onclick="openModal()">
            <div class="app-icon">🐟</div>
            <div class="app-name">Squishy Fish Merge</div>
        </div>
    </div>

    <div id="overlay" class="modal-overlay" onclick="closeModal()"></div>
    <div id="modal" class="modal">
        <h3>Squishy Fish Merge</h3>
        <p>This is our first release! Stay tuned for more updates and squishy fish action.</p>
        <button class="close-btn" onclick="closeModal()">GOT IT</button>
    </div>

    <footer>
        Contact: <a href="mailto:theodorepalsergames@gmail.com">theodorepalsergames@gmail.com</a>
    </footer>

    <script>
        function openModal() { document.getElementById('modal').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    </script>
</body>

</html>
